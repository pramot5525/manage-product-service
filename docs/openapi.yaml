openapi: 3.0.3
info:
  title: PRM Product API
  version: 1.0.0
  description: OpenAPI specification for manage-product-service service.
servers:
  - url: http://localhost:8080
    description: Local development
paths:
  /product:
    post:
      tags:
        - Product
      summary: Create product
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
              example:
                successful: true
                error_code: ""
                data:
                  id: 1
                  name: iPhone 15
                  description: Smartphone
                  sale_price: 899.99
                  price: 999.99
        '400':
          description: Invalid request body or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
              examples:
                invalidRequestBody:
                  value:
                    successful: false
                    error_code: invalid_request_body
                validationError:
                  value:
                    successful: false
                    error_code: validation_error
        '500':
          description: Failed to create product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
              example:
                successful: false
                error_code: failed_to_create_product

  /product/{id}:
    patch:
      tags:
        - Product
      summary: Partially update product
      description: Only provided fields are updated. Omitted fields are left unchanged. `description` and `sale_price` may be sent as `null` to clear values.
      operationId: updateProduct
      parameters:
        - in: path
          name: id
          required: true
          description: Product ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
              example:
                successful: true
                error_code: ""
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
              examples:
                invalidBody:
                  value:
                    successful: false
                    error_code: invalid_request_body
                invalidId:
                  value:
                    successful: false
                    error_code: invalid_id
                validationError:
                  value:
                    successful: false
                    error_code: validation_error
        '500':
          description: Failed to update product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIResponse'
              example:
                successful: false
                error_code: failed_to_update_product

components:
  schemas:
    APIResponse:
      type: object
      properties:
        successful:
          type: boolean
          example: true
        error_code:
          type: string
          example: ""
        data:
          allOf:
            - $ref: '#/components/schemas/Product'
          nullable: true
      required:
        - successful
        - error_code

    Product:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: iPhone 15
        description:
          type: string
          nullable: true
          example: Smartphone
        sale_price:
          type: number
          format: double
          nullable: true
          example: 899.99
        price:
          type: number
          format: double
          example: 999.99
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true
      required:
        - id
        - name
        - price

    ProductRequest:
      type: object
      properties:
        name:
          type: string
          example: iPhone 15
        description:
          type: string
          nullable: true
          example: Smartphone
        sale_price:
          type: number
          format: double
          nullable: true
          example: 899.99
        price:
          type: number
          format: double
          example: 999.99
      required:
        - name
        - price

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          example: iPhone 15 Pro
        description:
          type: string
          nullable: true
          example: Updated description
        sale_price:
          type: number
          format: double
          nullable: true
          example: 849.99
        price:
          type: number
          format: double
          example: 949.99
      additionalProperties: false
      description: |
        Partial update payload.
        - Omitted fields are not updated
        - description: null clears description
        - sale_price: null clears sale_price
        - name and price do not accept null
